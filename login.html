<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লগইন - ThumbAI BD</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--surface:#10101e;--card:#16162a;--border:#252540;--accent:#ff3c6e;--accent2:#7c3aff;--accent3:#00d4ff;--text:#f0f0ff;--muted:#8888aa;--glow:rgba(255,60,110,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hind Siliguri',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 20% 20%,rgba(124,58,255,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,60,110,.1) 0%,transparent 60%);pointer-events:none}
.container{position:relative;z-index:1;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px;font-family:'Exo 2',sans-serif;font-weight:900;font-size:28px;background:linear-gradient(135deg,#fff,var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
.tabs{display:flex;margin-bottom:28px;background:var(--surface);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:8px;font-weight:600;font-size:15px;transition:all .2s;color:var(--muted)}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.form{display:none}
.form.active{display:block}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Hind Siliguri',sans-serif;font-size:15px;padding:13px 16px;outline:none;transition:all .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-size:16px;font-weight:700;padding:15px;margin-top:6px;transition:all .3s;box-shadow:0 6px 25px var(--glow)}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{color:var(--muted);font-size:13px}
.google-btn{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-size:15px;font-weight:600;padding:13px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.google-btn:hover{border-color:var(--accent3)}
.msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-top:14px;display:none}
.msg.error{background:rgba(255,60,110,.1);border:1px solid rgba(255,60,110,.3);color:#ff8fab}
.msg.success{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent3)}
.back{text-align:center;margin-top:20px;color:var(--muted);font-size:14px}
.back a{color:var(--accent3);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🎨 ThumbAI BD</div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">লগইন</div>
      <div class="tab" onclick="switchTab('register')">রেজিস্ট্রেশন</div>
    </div>
    <div class="form active" id="loginForm">
      <div class="field"><label>ইমেইল</label><input type="email" id="loginEmail" placeholder="আপনার ইমেইল দিন"></div>
      <div class="field"><label>পাসওয়ার্ড</label><input type="password" id="loginPass" placeholder="পাসওয়ার্ড দিন"></div>
      <button class="btn" onclick="loginUser()" id="loginBtn">লগইন করুন</button>
      <div class="divider"><span>অথবা</span></div>
      <button class="google-btn" onclick="googleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google দিয়ে লগইন
      </button>
      <div class="msg" id="loginMsg"></div>
    </div>
    <div class="form" id="registerForm">
      <div class="field"><label>নাম</label><input type="text" id="regName" placeholder="আপনার নাম দিন"></div>
      <div class="field"><label>ইমেইল</label><input type="email" id="regEmail" placeholder="আপনার ইমেইল দিন"></div>
      <div class="field"><label>পাসওয়ার্ড</label><input type="password" id="regPass" placeholder="পাসওয়ার্ড দিন (কমপক্ষে ৬ অক্ষর)"></div>
      <button class="btn" onclick="registerUser()" id="regBtn">অ্যাকাউন্ট খুলুন</button>
      <div class="divider"><span>অথবা</span></div>
      <button class="google-btn" onclick="googleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google দিয়ে রেজিস্ট্রেশন
      </button>
      <div class="msg" id="regMsg"></div>
    </div>
  </div>
  <div class="back"><a href="index.html">← হোমে ফিরে যাও</a></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGXcRUon_JcN0V8u-QWYlxyYsH_5k1jEg",
  authDomain: "thumbnailbd.firebaseapp.com",
  projectId: "thumbnailbd",
  storageBucket: "thumbnailbd.firebasestorage.app",
  messagingSenderId: "644020331665",
  appId: "1:644020331665:web:3c64d94ee88f23e0228b30"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auto switch tab if came from register link
if(window.location.pathname.includes('register')) {
  setTimeout(() => window.switchTab && window.switchTab('register'), 100);
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = `msg ${type}`; el.style.display = 'block';
}

async function saveUser(user, name='') {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      name: name || user.displayName || '',
      email: user.email,
      plan: 'free',
      credits: 50,
      thumbnailCount: 0,
      createdAt: new Date().toISOString()
    });
  }
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('registerForm').classList.toggle('active', tab==='register');
}

window.loginUser = async function() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  if (!email||!pass) return showMsg('loginMsg','ইমেইল ও পাসওয়ার্ড দিন','error');
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'অপেক্ষা করুন...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showMsg('loginMsg','✅ লগইন সফল! Dashboard এ যাচ্ছি...','success');
    setTimeout(()=>window.location.href='dashboard.html',1000);
  } catch(e) {
    let msg = 'লগইন ব্যর্থ হয়েছে';
    if(e.code==='auth/user-not-found') msg='এই ইমেইলে কোনো অ্যাকাউন্ট নেই';
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') msg='ইমেইল বা পাসওয়ার্ড ভুল';
    showMsg('loginMsg',msg,'error');
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='লগইন করুন';
  }
}

window.registerUser = async function() {
  const name=document.getElementById('regName').value;
  const email=document.getElementById('regEmail').value;
  const pass=document.getElementById('regPass').value;
  if(!name||!email||!pass) return showMsg('regMsg','সব তথ্য দিন','error');
  if(pass.length<6) return showMsg('regMsg','পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে','error');
  document.getElementById('regBtn').disabled=true;
  document.getElementById('regBtn').textContent='অপেক্ষা করুন...';
  try {
    const cred = await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    await saveUser(cred.user,name);
    showMsg('regMsg','✅ রেজিস্ট্রেশন সফল! Dashboard এ যাচ্ছি...','success');
    setTimeout(()=>window.location.href='dashboard.html',1000);
  } catch(e) {
    let msg='রেজিস্ট্রেশন ব্যর্থ হয়েছে';
    if(e.code==='auth/email-already-in-use') msg='এই ইমেইল আগেই ব্যবহার হয়েছে';
    showMsg('regMsg',msg,'error');
    document.getElementById('regBtn').disabled=false;
    document.getElementById('regBtn').textContent='অ্যাকাউন্ট খুলুন';
  }
}

window.googleLogin = async function() {
  const provider = new GoogleAuthProvider();
  try {
    const cred = await signInWithPopup(auth,provider);
    await saveUser(cred.user);
    window.location.href='dashboard.html';
  } catch(e) {
    showMsg('loginMsg','Google লগইন ব্যর্থ হয়েছে','error');
    showMsg('regMsg','Google লগইন ব্যর্থ হয়েছে','error');
  }
}
</script>
</body>
</html>
